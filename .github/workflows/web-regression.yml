name: web-regression

on:
  pull_request:
  workflow_dispatch:

jobs:
  web-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run web regression matrix
        run: pnpm --filter @academy/web test:regression

      - name: Run web typecheck
        run: pnpm --filter @academy/web typecheck
